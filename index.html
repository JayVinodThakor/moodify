<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Moodify — AI Music</title>

<script defer src="https://unpkg.com/face-api.js"></script>

<style>
body {
  background: #0a0a0a;
  color: white;
  font-family: sans-serif;
  display: flex;
  gap: 20px;
  padding: 20px;
}

.left, .right {
  flex: 1;
}

video {
  width: 100%;
  border-radius: 10px;
}

button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  background: white;
  color: black;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.playlist-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  max-height: 80vh;
  overflow-y: auto;
}

iframe {
  width: 100%;
  height: 200px;
  border-radius: 10px;
  border: none;
}
</style>
</head>

<body>

<div class="left">
  <video id="video" autoplay muted></video>
  <button onclick="startScan()">Start Detection</button>
  <button onclick="restartScan()">Re-Scan</button>
</div>

<div class="right">
  <h2 id="mood">Mood: —</h2>
  <div class="playlist-grid" id="videos"></div>
</div>

<script>
let video = document.getElementById("video");
let emotionHistory = [];
let currentMood = null;
let videoPage = 0;

async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: true });
  video.srcObject = stream;
}

async function loadModels() {
  await faceapi.nets.tinyFaceDetector.loadFromUri('/models');
  await faceapi.nets.faceExpressionNet.loadFromUri('/models');
}

async function startScan() {
  emotionHistory = [];
  document.getElementById("mood").textContent = "Scanning...";

  let startTime = Date.now();

  const interval = setInterval(async () => {
    const detections = await faceapi
      .detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
      .withFaceExpressions();

    if (detections.length > 0) {
      const exp = detections[0].expressions;

      const mapped = {
        Happy: exp.happy,
        Sad: exp.sad,
        Angry: exp.angry,
        Neutral: exp.neutral,
        Surprise: exp.surprised
      };

      const mood = Object.keys(mapped).reduce((a, b) =>
        mapped[a] > mapped[b] ? a : b
      );

      emotionHistory.push(mood);
    }

    if (Date.now() - startTime > 10000) {
      clearInterval(interval);
      finalizeMood();
    }

  }, 500);
}

function finalizeMood() {
  let count = {};

  emotionHistory.forEach(m => {
    count[m] = (count[m] || 0) + 1;
  });

  const finalMood = Object.keys(count).reduce((a, b) =>
    count[a] > count[b] ? a : b
  );

  currentMood = finalMood;

  document.getElementById("mood").textContent = "Mood: " + finalMood;

  renderVideos(finalMood, true);
}

function renderVideos(mood, reset = true) {
  const grid = document.getElementById("videos");

  if (reset) {
    grid.innerHTML = "";
    videoPage = 0;
  }

  const query = mood + " songs";

  for (let i = 0; i < 6; i++) {
    const iframe = document.createElement("iframe");
    iframe.src = `https://www.youtube.com/embed?listType=search&list=${encodeURIComponent(query)}&index=${i + videoPage * 6}`;
    grid.appendChild(iframe);
  }

  videoPage++;
}

document.getElementById("videos").addEventListener("scroll", () => {
  const grid = document.getElementById("videos");

  if (grid.scrollTop + grid.clientHeight >= grid.scrollHeight - 20) {
    if (currentMood) renderVideos(currentMood, false);
  }
});

function restartScan() {
  document.getElementById("videos").innerHTML = "";
  document.getElementById("mood").textContent = "Mood: —";
  emotionHistory = [];
  currentMood = null;
}

startCamera();
loadModels();
</script>

</body>
</html>
