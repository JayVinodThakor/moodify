<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Moodify — AI Music Recommender</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --surface: #111111;
      --surface2: #191919;
      --border: rgba(255,255,255,0.07);
      --border-bright: rgba(255,255,255,0.15);
      --text: #f2f2f2;
      --muted: #555;
      --dim: #2e2e2e;
      --happy:   #f7c948;
      --sad:     #5b9cf6;
      --angry:   #f46a6a;
      --neutral: #a3e6a3;
      --surprise:#d17aff;
      --accent:  #f2f2f2;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 420px 1fr;
      grid-template-rows: auto 1fr auto;
    }

    /* NOISE */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.03; pointer-events: none;
    }

    /* ── HEADER ── */
    header {
      grid-column: 1 / -1;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 2rem;
      border-bottom: 1px solid var(--border);
      position: relative; z-index: 10;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 1.25rem; letter-spacing: -0.02em;
    }
    .logo span { color: var(--muted); font-weight: 400; }
    .status-pill {
      display: flex; align-items: center; gap: 7px;
      background: var(--surface2); border: 1px solid var(--border);
      padding: 5px 14px; border-radius: 999px;
      font-size: 0.75rem; color: var(--muted);
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--dim); transition: background 0.4s, box-shadow 0.4s; }
    .dot.live { background: #4ade80; box-shadow: 0 0 8px #4ade8077; }
    .dot.locked { background: var(--happy); box-shadow: 0 0 8px #f7c94866; }

    /* ── LEFT PANEL ── */
    .left {
      position: sticky; top: 0; height: 100vh;
      z-index: 2;
      padding: 1.8rem;
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center; gap: 1.2rem;
      overflow: hidden;
    }

    /* Camera box */
    .cam-wrap {
      width: 100%; max-width: 340px;
      aspect-ratio: 1;
      border-radius: 18px; overflow: hidden;
      border: 1px solid var(--border-bright);
      background: var(--surface);
      position: relative;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .cam-wrap video, .cam-wrap canvas {
      width: 100% !important; height: 100% !important;
      object-fit: cover; display: block; border-radius: 0;
    }
    .cam-placeholder {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      color: var(--muted); font-size: 0.83rem;
    }
    .cam-icon {
      width: 48px; height: 48px; border-radius: 50%;
      border: 1px solid var(--border-bright);
      display: flex; align-items: center; justify-content: center;
    }
    .cam-icon svg { width: 20px; height: 20px; stroke: var(--muted); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

    /* scan line */
    .scan-line {
      position: absolute; left: 0; right: 0; height: 2px; top: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
      opacity: 0; display: none;
      animation: scan 2.2s ease-in-out infinite;
    }
    @keyframes scan {
      0%   { top: 0%;   opacity: 0; }
      8%   { opacity: 0.5; }
      92%  { opacity: 0.5; }
      100% { top: 100%; opacity: 0; }
    }

    /* brackets */
    .cam-wrap::before, .cam-wrap::after {
      content: ''; position: absolute;
      width: 20px; height: 20px;
      border-color: var(--border-bright); border-style: solid; z-index: 3;
    }
    .cam-wrap::before { top: 9px; left: 9px; border-width: 2px 0 0 2px; border-radius: 3px 0 0 0; }
    .cam-wrap::after  { bottom: 9px; right: 9px; border-width: 0 2px 2px 0; border-radius: 0 0 3px 0; }

    /* ── TIMER RING ── */
    .timer-ring-wrap {
      position: absolute; bottom: 10px; left: 10px;
      width: 42px; height: 42px;
      display: none; z-index: 4;
    }
    .timer-ring-wrap svg { transform: rotate(-90deg); }
    .timer-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 3; }
    .timer-arc {
      fill: none; stroke: var(--accent); stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 113; /* 2π×18 */
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear, stroke 0.5s;
    }
    .timer-num {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-size: 0.8rem; font-weight: 700;
      color: var(--accent);
    }

    /* ── MOOD BARS ── */
    .mood-bars { width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 7px; }
    .bar-row { display: flex; align-items: center; gap: 9px; font-size: 0.75rem; color: var(--muted); }
    .bar-label { width: 54px; text-align: right; }
    .bar-track { flex: 1; height: 3px; background: var(--dim); border-radius: 99px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 99px; width: 0%; transition: width 0.35s ease; }
    .bar-pct { width: 32px; text-align: right; font-variant-numeric: tabular-nums; }

    /* bar colors per emotion */
    #bar-Happy   { background: var(--happy); }
    #bar-Sad     { background: var(--sad); }
    #bar-Angry   { background: var(--angry); }
    #bar-Neutral { background: var(--neutral); }
    #bar-Surprise{ background: var(--surprise); }

    /* ── BUTTONS ── */
    .btn-primary {
      width: 100%; max-width: 340px; padding: 0.85rem;
      background: var(--text); color: #080808;
      border: none; border-radius: 11px;
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.9rem; letter-spacing: 0.02em;
      cursor: pointer; transition: opacity 0.2s, transform 0.15s;
      flex-shrink: 0;
    }
    .btn-primary:hover:not(:disabled) { opacity: 0.87; transform: translateY(-1px); }
    .btn-primary:active:not(:disabled) { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.25; cursor: not-allowed; }

    .btn-rescan {
      width: 100%; max-width: 340px; padding: 0.75rem;
      background: transparent; color: var(--muted);
      border: 1px solid var(--border-bright); border-radius: 11px;
      font-family: 'Syne', sans-serif; font-weight: 600;
      font-size: 0.85rem; letter-spacing: 0.04em; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s;
      display: none; flex-shrink: 0;
    }
    .btn-rescan:hover { color: var(--text); border-color: rgba(255,255,255,0.3); background: var(--surface2); }

    /* ── RIGHT PANEL ── */
    .right {
      position: relative; z-index: 1;
      padding: 1.8rem 2rem;
      display: flex; flex-direction: column; gap: 1.4rem;
      overflow-y: auto; min-height: 0;
    }

    /* ── MOOD HERO ── */
    .mood-hero {
      padding: 1.8rem 2rem; border-radius: 18px;
      border: 1px solid var(--border); background: var(--surface);
      display: flex; flex-direction: column; gap: 5px;
      min-height: 130px; justify-content: center;
      position: relative; overflow: hidden;
      transition: border-color 0.6s;
    }
    .mood-hero::before {
      content: ''; position: absolute; inset: 0;
      opacity: 0; transition: opacity 0.7s; pointer-events: none;
    }
    .mood-tag { font-size: 0.67rem; letter-spacing: 0.13em; text-transform: uppercase; color: var(--muted); }
    .mood-name {
      font-family: 'Syne', sans-serif; font-size: 3rem;
      font-weight: 800; line-height: 1; letter-spacing: -0.03em;
      transition: color 0.5s;
    }
    .mood-conf { font-size: 0.82rem; color: var(--muted); margin-top: 3px; }

    /* ── LOCKED BANNER ── */
    .locked-badge {
      display: none;
      position: absolute; top: 14px; right: 14px;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border-bright);
      border-radius: 999px; padding: 4px 12px;
      font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted);
    }

    /* ── SECTION LABEL ── */
    .section-label { font-size: 0.67rem; letter-spacing: 0.13em; text-transform: uppercase; color: var(--muted); }

    /* ── WAITING STATE ── */
    .waiting-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; color: var(--muted); padding: 3.5rem 0;
      font-size: 0.86rem; text-align: center;
      border: 1px dashed var(--border); border-radius: 14px;
    }
    .waiting-state svg { width: 26px; height: 26px; stroke: var(--dim); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

    /* ── SCANNING STATE ── */
    .scanning-state {
      display: none;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; padding: 3rem 0;
      border: 1px dashed var(--border); border-radius: 14px;
    }
    .scan-pulse {
      width: 36px; height: 36px; border-radius: 50%;
      border: 2px solid var(--border-bright);
      position: relative;
    }
    .scan-pulse::after {
      content: ''; position: absolute; inset: -6px;
      border-radius: 50%; border: 2px solid rgba(255,255,255,0.1);
      animation: pulse 1.4s ease-out infinite;
    }
    @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.6); opacity: 0; } }
    .scan-text { font-size: 0.82rem; color: var(--muted); }
    .scan-countdown { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; color: var(--text); line-height: 1; }

    /* ── VIDEO GRID ── */
    .video-section { display: none; flex-direction: column; gap: 1rem; }
    .video-section.visible { display: flex; }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .yt-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
    }
    .yt-card:hover { border-color: var(--border-bright); transform: translateY(-2px); }

    .yt-embed {
      position: relative; width: 100%; padding-bottom: 56.25%;
      background: #000;
    }
    .yt-embed iframe {
      position: absolute; inset: 0;
      width: 100%; height: 100%; border: none;
    }

    .yt-meta { padding: 10px 12px; }
    .yt-title { font-size: 0.82rem; font-weight: 500; line-height: 1.4; color: var(--text); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .yt-channel { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }

    /* loading skeletons */
    .yt-skeleton {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
    }
    .skel-thumb { width: 100%; padding-bottom: 56.25%; background: var(--surface2); position: relative; overflow: hidden; }
    .skel-thumb::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 50%, transparent 100%);
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    .skel-line { height: 10px; background: var(--surface2); border-radius: 4px; margin: 12px 12px 6px; }
    .skel-line.short { width: 55%; margin-top: 0; }

    /* ── FOOTER ── */
    footer {
      grid-column: 1 / -1;
      border-top: 1px solid var(--border);
      padding: 0.9rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      font-size: 0.72rem; color: var(--muted);
      position: relative; z-index: 2;
    }

    /* ── THEMES ── */
    .theme-happy  .mood-name { color: var(--happy); }
    .theme-happy  .mood-hero { border-color: rgba(247,201,72,0.2); }
    .theme-happy  .mood-hero::before { background: radial-gradient(ellipse at 10% 10%, rgba(247,201,72,0.08), transparent 60%); opacity: 1; }
    .theme-happy  .timer-arc { stroke: var(--happy); }
    .theme-happy  .scan-countdown { color: var(--happy); }

    .theme-sad    .mood-name { color: var(--sad); }
    .theme-sad    .mood-hero { border-color: rgba(91,156,246,0.2); }
    .theme-sad    .mood-hero::before { background: radial-gradient(ellipse at 10% 10%, rgba(91,156,246,0.08), transparent 60%); opacity: 1; }
    .theme-sad    .timer-arc { stroke: var(--sad); }
    .theme-sad    .scan-countdown { color: var(--sad); }

    .theme-angry  .mood-name { color: var(--angry); }
    .theme-angry  .mood-hero { border-color: rgba(244,106,106,0.2); }
    .theme-angry  .mood-hero::before { background: radial-gradient(ellipse at 10% 10%, rgba(244,106,106,0.08), transparent 60%); opacity: 1; }
    .theme-angry  .timer-arc { stroke: var(--angry); }
    .theme-angry  .scan-countdown { color: var(--angry); }

    .theme-neutral .mood-name { color: var(--neutral); }
    .theme-neutral .mood-hero { border-color: rgba(163,230,163,0.2); }
    .theme-neutral .mood-hero::before { background: radial-gradient(ellipse at 10% 10%, rgba(163,230,163,0.08), transparent 60%); opacity: 1; }
    .theme-neutral .timer-arc { stroke: var(--neutral); }
    .theme-neutral .scan-countdown { color: var(--neutral); }

    .theme-surprise .mood-name { color: var(--surprise); }
    .theme-surprise .mood-hero { border-color: rgba(209,122,255,0.2); }
    .theme-surprise .mood-hero::before { background: radial-gradient(ellipse at 10% 10%, rgba(209,122,255,0.08), transparent 60%); opacity: 1; }
    .theme-surprise .timer-arc { stroke: var(--surprise); }
    .theme-surprise .scan-countdown { color: var(--surprise); }

    /* responsive */
    @media (max-width: 800px) {
      body { grid-template-columns: 1fr; }
      .left { position: relative; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
      .mood-name { font-size: 2.2rem; }
      .video-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

    <div class="bar-row">

      <div class="bar-track"><div class="bar-fill" id="bar-Neutral"></div></div>
      <span class="bar-pct" id="pct-Neutral">0%</span>

    <div class="bar-row">
      <span class="bar-label">Surprise</span>
      <div class="bar-track"><div class="bar-fill" id="bar-Surprise"></div></div>
      <span class="bar-pct" id="pct-Surprise">0%</span>

  </div>

  <button class="btn-primary" id="start-btn" onclick="startScan()">Start Detection</button>
  <button class="btn-rescan" id="rescan-btn" onclick="rescan()">↺ Scan Again</button>
</div>

<!-- RIGHT: RESULTS -->
<div class="right" id="right-panel">

  <!-- MOOD HERO -->
  <div class="mood-hero" id="mood-hero">
    <div class="mood-tag">Detected mood</div>
    <div class="mood-name" id="mood-name">—</div>
    <div class="mood-conf" id="mood-conf">Start the camera to detect your mood</div>
    <div class="locked-badge" id="locked-badge">✓ Locked In</div>
  </div>

  <!-- WAITING -->
  <div class="waiting-state" id="waiting-state">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    Videos will appear after mood is locked in
  </div>

  <!-- SCANNING -->
  <div class="scanning-state" id="scanning-state">
    <div class="scan-pulse"></div>
    <div class="scan-text">Analyzing your expression…</div>
    <div class="scan-countdown" id="scan-countdown">10</div>
  </div>

  <!-- VIDEO SECTION -->
  <div class="video-section" id="video-section">
    <div class="section-label" id="video-label">Videos for your mood</div>
    <div class="video-grid" id="video-grid"></div>
  </div>

</div>

<!-- FOOTER -->
<footer>
  <span>Powered by face-api.js</span>
  <span>Moodify — AI Mini Project</span>
</footer>

    { id: "WSeNSzJ2-Jw", title: "Thunderstruck — AC/DC", channel: "AC/DC" },
    { id: "dQw4w9WgXcQ", title: "Never Gonna Give You Up — Rick Astley", channel: "Rick Astley" },
    { id: "y6120QOlsfU", title: "Sandstorm — Darude", channel: "Darude" },
  ]
};

// ══════════════════════════════════════════════
// NEUTRAL FIX — CONFIGURATION
// ══════════════════════════════════════════════

// How much to dampen Neutral during accumulation.
// 0.25 means Neutral only contributes 25% of its raw score.
// Lower = harder to get Neutral. Tune between 0.15–0.35.
const NEUTRAL_WEIGHT = 0.25;

// Minimum confidence (0–1) any emotion must reach in a single frame
// before we bother accumulating it. Filters out weak noise.
const EMOTION_THRESHOLD = 0.15;

// If the top non-Neutral emotion never exceeds this share of total
// accumulated score, we fall back to Neutral anyway.
const NEUTRAL_FALLBACK_RATIO = 0.10;

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let video, detectInterval, timerInterval;
let scanning = false, locked = false;
let timeLeft = 12;
let moodScores = { Happy: 0, Sad: 0, Angry: 0, Neutral: 0, Surprise: 0 };
let currentDisplayMood = null;

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
async function startScan() {
  const btn = document.getElementById("start-btn");
  btn.disabled = true;
  btn.textContent = "Loading AI...";
  setStatus("Loading…", false);

  try {
    await faceapi.nets.tinyFaceDetector.loadFromUri('./models');
    await faceapi.nets.faceExpressionNet.loadFromUri('./models');

    video = document.createElement("video");
    video.width = 340; video.height = 340;
    video.autoplay = true; video.muted = true; video.playsInline = true;

    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;

    document.getElementById("cam-placeholder").style.display = "none";
    document.getElementById("webcam-container").appendChild(video);
    document.getElementById("scan-line").style.display = "block";
    document.getElementById("start-btn").style.display = "none";

    setStatus("Live", true);

    video.addEventListener("play", () => {
      beginCountdown();
    });

  } catch (e) {
    console.error(e);
    btn.disabled = false;
    btn.textContent = "Retry";
    setStatus("Error — check console", false);
  }
}

// ══════════════════════════════════════════════
// COUNTDOWN + DETECTION
// ══════════════════════════════════════════════
function beginCountdown() {
  scanning = true;
  locked = false;
  timeLeft = 12;
  moodScores = { Happy: 0, Sad: 0, Angry: 0, Neutral: 0, Surprise: 0 };

  document.getElementById("waiting-state").style.display = "none";
  document.getElementById("scanning-state").style.display = "flex";
  document.getElementById("video-section").classList.remove("visible");

  const ringWrap = document.getElementById("timer-ring-wrap");
  ringWrap.style.display = "block";
  updateTimerRing(timeLeft, 12);

  detectInterval = setInterval(runDetection, 800);

  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById("scan-countdown").textContent = timeLeft;
    document.getElementById("timer-num").textContent = timeLeft;
    updateTimerRing(timeLeft, 12);

    if (timeLeft <= 0) {
      lockMood();
    }
  }, 1000);
}

async function runDetection() {
  if (!video || !scanning) return;

  try {
    const detections = await faceapi
      .detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
      .withFaceExpressions();

    if (detections.length > 0) {
      const exp = detections[0].expressions;

      const raw = {
        Happy:   exp.happy    || 0,
        Sad:     exp.sad      || 0,
        Angry:   exp.angry    || 0,
        Neutral: exp.neutral  || 0,
        Surprise:exp.surprised|| 0
      };

      // ── FIX 1: Apply Neutral dampening before accumulation ──
      // Neutral is multiplied by NEUTRAL_WEIGHT so it can't
      // drown out genuine emotions across frames.
      const dampened = {
        Happy:   raw.Happy,
        Sad:     raw.Sad,
        Angry:   raw.Angry,
        Neutral: raw.Neutral * NEUTRAL_WEIGHT,
        Surprise:raw.Surprise
      };

      // ── FIX 2: Only accumulate emotions above the threshold ──
      // Weak detections (noise) don't pollute the total score.
      Object.keys(dampened).forEach(k => {
        if (raw[k] >= EMOTION_THRESHOLD) {
          moodScores[k] += dampened[k];
        }
      });

      // For live display bars, show raw values (undampened) so bars
      // still look natural and reflect the real detection.
      const dominantRaw = Object.keys(raw).reduce((a, b) => raw[a] > raw[b] ? a : b);
      const confRaw = Math.round(raw[dominantRaw] * 100);

      updateBars(raw, dominantRaw);
      updateMoodHero(dominantRaw, confRaw, false);
    }
  } catch(e) {}
}

// ══════════════════════════════════════════════
// LOCK IN MOOD
// ══════════════════════════════════════════════
function lockMood() {
  clearInterval(detectInterval);
  clearInterval(timerInterval);
  scanning = false;
  locked = true;

  if (video && video.srcObject) {
    video.srcObject.getTracks().forEach(t => t.stop());
  }
  document.getElementById("scan-line").style.display = "none";
  document.getElementById("timer-ring-wrap").style.display = "none";

  const total = Object.values(moodScores).reduce((a, b) => a + b, 0);

  // ── FIX 3: Neutral-as-fallback logic ──
  // Find the best non-Neutral emotion.
  const nonNeutralMoods = ["Happy", "Sad", "Angry", "Surprise"];
  const bestNonNeutral = nonNeutralMoods.reduce((a, b) =>
    moodScores[a] > moodScores[b] ? a : b
  );
  const bestNonNeutralShare = total > 0 ? moodScores[bestNonNeutral] / total : 0;

  // Only use Neutral if no other emotion is strong enough to claim the win.
  // Otherwise pick the top non-Neutral emotion.
  let finalMood;
  if (bestNonNeutralShare >= NEUTRAL_FALLBACK_RATIO) {
    // A real emotion was detected — find overall winner (Neutral
    // is already dampened so it should lose fairly)
    finalMood = Object.keys(moodScores).reduce((a, b) =>
      moodScores[a] > moodScores[b] ? a : b
    );
    // Safety: if winner is still Neutral despite dampening, use bestNonNeutral
    if (finalMood === "Neutral") finalMood = bestNonNeutral;
  } else {
    // Face was totally blank the whole scan — Neutral is correct
    finalMood = "Neutral";
  }

  const conf = total > 0 ? Math.round((moodScores[finalMood] / total) * 100) : 0;

  updateMoodHero(finalMood, conf, true);
  document.getElementById("locked-badge").style.display = "block";
  setStatus("Locked: " + finalMood, false);
  document.getElementById("status-dot").classList.add("locked");

  document.getElementById("rescan-btn").style.display = "block";

  document.getElementById("scanning-state").style.display = "none";
  renderVideos(finalMood);
}

// ══════════════════════════════════════════════
// RESCAN
// ══════════════════════════════════════════════
function rescan() {
  locked = false;

  document.getElementById("locked-badge").style.display = "none";
  document.getElementById("rescan-btn").style.display = "none";
  document.getElementById("video-section").classList.remove("visible");
  document.getElementById("waiting-state").style.display = "flex";
  document.getElementById("status-dot").classList.remove("locked");
  document.getElementById("mood-name").textContent = "—";
  document.getElementById("mood-conf").textContent = "Scanning…";

  ["Happy","Sad","Angry","Neutral","Surprise"].forEach(m => {
    const f = document.getElementById("bar-" + m);
    const p = document.getElementById("pct-" + m);
    if (f) f.style.width = "0%";
    if (p) p.textContent = "0%";
  });

  const panel = document.getElementById("right-panel");
  const hero = document.getElementById("mood-hero");
  ["theme-happy","theme-sad","theme-angry","theme-neutral","theme-surprise"].forEach(t => {
    panel.classList.remove(t); hero.classList.remove(t);
  });

  const container = document.getElementById("webcam-container");
  container.innerHTML = "";

  startScan();
}

// ══════════════════════════════════════════════
// RENDER YOUTUBE VIDEOS
// ══════════════════════════════════════════════
function renderVideos(mood) {
  const section = document.getElementById("video-section");
  const grid = document.getElementById("video-grid");
  const label = document.getElementById("video-label");

  const moodEmoji = { Happy:"😄", Sad:"😢", Angry:"😤", Neutral:"😐", Surprise:"😲" };
  label.textContent = `${moodEmoji[mood] || ""} ${mood} Vibes — Watch & Enjoy`;

  grid.innerHTML = Array(6).fill(0).map(() => `
    <div class="yt-skeleton">
      <div class="skel-thumb"></div>
      <div class="skel-line"></div>
      <div class="skel-line short"></div>
    </div>
  `).join('');

  section.classList.add("visible");

  setTimeout(() => {
    const vids = VIDEOS[mood] || VIDEOS["Neutral"];
    grid.innerHTML = vids.map(v => `
      <div class="yt-card">
        <div class="yt-embed">
          <iframe
            src="https://www.youtube.com/embed/${v.id}?rel=0&modestbranding=1"
            title="${v.title}"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen
            loading="lazy">
          </iframe>
        </div>
        <div class="yt-meta">
          <div class="yt-title">${v.title}</div>
          <div class="yt-channel">${v.channel}</div>
        </div>
      </div>
    `).join('');
  }, 900);
}

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
function updateBars(mapped, activeMood) {
  Object.keys(mapped).forEach(name => {
    const pct = Math.round(mapped[name] * 100);
    const fill = document.getElementById("bar-" + name);
    const pctEl = document.getElementById("pct-" + name);
    if (fill) fill.style.width = pct + "%";
    if (pctEl) pctEl.textContent = pct + "%";
  });
}

function updateMoodHero(mood, conf, isFinal) {
  if (mood === currentDisplayMood && !isFinal) return;
  currentDisplayMood = mood;

  document.getElementById("mood-name").textContent = mood;
  document.getElementById("mood-conf").textContent = isFinal
    ? `Locked in at ${conf}% confidence`
    : `${conf}% confidence`;

  const themeMap = {
    Happy:"theme-happy", Sad:"theme-sad", Angry:"theme-angry",
    Neutral:"theme-neutral", Surprise:"theme-surprise"
  };
  const hero = document.getElementById("mood-hero");
  const panel = document.getElementById("right-panel");
  Object.values(themeMap).forEach(t => { hero.classList.remove(t); panel.classList.remove(t); });
  if (themeMap[mood]) { hero.classList.add(themeMap[mood]); panel.classList.add(themeMap[mood]); }
}

function updateTimerRing(current, total) {
  const arc = document.getElementById("timer-arc");
  const circumference = 113;
  const progress = current / total;
  arc.style.strokeDashoffset = circumference * (1 - progress);
  document.getElementById("timer-num").textContent = current;
}

function setStatus(text, live) {
  document.getElementById("status-text").textContent = text;
  document.getElementById("status-dot").classList.toggle("live", live);
}
</script>
